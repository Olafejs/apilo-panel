<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>Apilo - Logowanie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body class="auth">
    <section class="auth-card">
      <h1>Panel magazynowy</h1>
      <p class="subtle">Zaloguj się, aby kontynuować</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="messages">
            {% for category, message in messages %}
              <div class="message {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <form method="post" class="stack">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
          Hasło
          <input type="password" name="password" placeholder="Wpisz hasło" autocomplete="current-password" autofocus required>
        </label>
        <button class="btn primary" type="submit">Zaloguj</button>
      </form>
    </section>
  </body>
</html>
