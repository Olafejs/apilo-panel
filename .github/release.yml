changelog:
  categories:
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Security
      labels:
        - security
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Tests and Maintenance
      labels:
        - test
        - chore
        - refactor
  exclude:
    labels:
      - skip-changelog
